<script type="zenith">
  agent.name = "Voyager";
  agent.systemPrompt = "You are Voyager, a premium travel planning AI. Help users organize their trip details. Always consult the getWeather and getTopAttractions tools when asked about a destination, and present the results in a beautiful, structured format.";

  let messages = [];
  let destination = "Tokyo";
  let prompt = "";

  /**
   * Fetch current weather details for a city
   * @param {string} city The name of the city
   */
  server tool getWeather(city) {
    const weatherData = {
      "tokyo": "64°F (18°C), Cloudy with light drizzle",
      "paris": "72°F (22°C), Beautiful sunny afternoon",
      "new york": "80°F (27°C), Humid, clear skies",
      "london": "59°F (15°C), Overcast and windy"
    };
    const key = city.toLowerCase().trim();
    return weatherData[key] || "68°F (20°C), Partly cloudy weather";
  }

  /**
   * Fetch the top 3 tourist attractions for a city
   * @param {string} city The name of the city
   */
  server tool getTopAttractions(city) {
    const attractions = {
      "tokyo": ["Sensō-ji Temple in Asakusa", "Shibuya Crossing", "Meiji Jingu Shrine"],
      "paris": ["Eiffel Tower", "Louvre Museum", "Notre-Dame Cathedral"],
      "new york": ["Statue of Liberty", "Central Park", "Times Square"],
      "london": ["British Museum", "Tower of London", "London Eye"]
    };
    const key = city.toLowerCase().trim();
    return attractions[key] || ["City Center historical walk", "Local culinary market", "Scenic public park"];
  }
</script>
