<script type="zenith">
  agent.name = "Aura";
  agent.systemPrompt = "You are Aura, an elite personal wealth manager and AI investment coach. Help users analyze asset allocations, run compound interest projections, and simulate stock market metrics. Always advise users based on their selected riskProfile, and consult the getSimulatedSecurityData, calculateInterestProjection, and generateAssetAllocation tools when they ask for specific numbers or allocations. Present data in clean tables or structured lists.";

  let messages = [];
  let prompt = "";
  let riskProfile = "Medium";
  let ticker = "AAPL";
  let principalAmount = "10000";
  let yearsCount = "10";
  let calculatorResult = "No active projection. Fill inputs and calculate.";

  /**
   * Fetch simulated real-time market metrics for a stock ticker
   * @param {string} ticker The stock ticker symbol
   */
  server tool getSimulatedSecurityData(ticker) {
    const { GoogleGenerativeAI } = await import('@google/generative-ai');
    const key = process.env.GEMINI_API_KEY;
    const genAI = new GoogleGenerativeAI(key);
    const model = genAI.getGenerativeModel({ model: 'gemini-2.5-flash' });
    
    const promptText = `Return highly accurate simulated or real stock parameters for the ticker symbol: "${ticker}". Return ONLY a JSON object in this exact format, with no markdown tags and no extra text:
{
  "name": "Full Company Name",
  "price": "$Price",
  "pe": "P/E ratio",
  "yield": "Dividend yield",
  "beta": "Beta value",
  "cap": "Market cap",
  "outlook": "Short 1-sentence outlook"
}`;

    try {
      const response = await model.generateContent({ contents: [{ role: 'user', parts: [{ text: promptText }] }] });
      const text = response.response.text().trim();
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        return JSON.parse(jsonMatch[0]);
      }
      throw new Error("Could not parse JSON response from Gemini");
    } catch (err) {
      console.error("Gemini stock tool error:", err);
      return { 
        name: ticker.toUpperCase(), 
        price: "$100.00", 
        pe: "15.0", 
        yield: "1.0%", 
        beta: "1.00", 
        cap: "N/A", 
        outlook: "Temporary scanner outage. Standard neutral outlook." 
      };
    }
  }

  /**
   * Calculate future value with monthly interest contributions
   * @param {number} principal Initial starting amount
   * @param {number} monthlyContribution Monthly savings added
   * @param {number} rate Annual return rate percentage
   * @param {number} years Years to grow
   */
  server tool calculateInterestProjection(principal, monthlyContribution, rate, years) {
    const p = parseFloat(principal) || 0;
    const m = parseFloat(monthlyContribution) || 0;
    const r = (parseFloat(rate) || 7) / 100 / 12;
    const y = parseFloat(years) || 10;
    const months = y * 12;
    
    let total = p;
    let contributions = p;
    
    for (let i = 0; i < months; i++) {
      total = total * (1 + r) + m;
      contributions += m;
    }
    
    const interest = total - contributions;
    return {
      principal: `$${p.toLocaleString(undefined, {maximumFractionDigits: 0})}`,
      contributions: `$${contributions.toLocaleString(undefined, {maximumFractionDigits: 0})}`,
      interest: `$${interest.toLocaleString(undefined, {maximumFractionDigits: 0})}`,
      total: `$${total.toLocaleString(undefined, {maximumFractionDigits: 0})}`
    };
  }

  /**
   * Recommend target asset weights matching a risk profile
   * @param {string} riskProfile Low, Medium, or High risk level
   * @param {string} targetAmount Target portfolio value goal
   * @param {number} years Investment time horizon
   */
  server tool generateAssetAllocation(riskProfile, targetAmount, years) {
    const profile = riskProfile.toLowerCase().trim();
    let allocations = [];
    
    if (profile === 'low') {
      allocations = [
        { asset: "Bonds & Fixed Income", weight: "60%" },
        { asset: "Large-Cap Equities", weight: "25%" },
        { asset: "Cash & Money Market", weight: "15%" }
      ];
    } else if (profile === 'high') {
      allocations = [
        { asset: "Growth & Technology Equities", weight: "50%" },
        { asset: "Emerging Markets / Small-Cap", weight: "25%" },
        { asset: "Cryptocurrencies & High-Yield", weight: "15%" },
        { asset: "Fixed Income / Cash", weight: "10%" }
      ];
    } else {
      allocations = [
        { asset: "Large-Cap & Index Equities", weight: "50%" },
        { asset: "Corporate & Government Bonds", weight: "30%" },
        { asset: "Growth Equities / Real Estate", weight: "20%" }
      ];
    }
    
    return { profile: riskProfile, target: targetAmount, years, allocations };
  }
</script>
