<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Developer Console</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <style>
    :root {
      --bg: #131314;
      --surface: #1e1f20;
      --surface-raised: #282a2d;
      --surface-container: #1e1f20;
      --border: rgba(255, 255, 255, 0.05);
      --border-focus: #7cacf8;
      --primary: #a8c7fa;
      --primary-hover: #7cacf8;
      --text: #e3e3e3;
      --text-muted: #8e918f;
      --text-light: #c4c7c5;
      
      --success: #c4eed0;
      --success-text: #146c2e;
      --warning: #ffe294;
      --warning-text: #664d03;
      --error: #f2b8b5;
      --error-text: #601410;
      
      --font-main: 'Outfit', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --accent-gradient: linear-gradient(90deg, #7cacf8, #c5b3e6, #f2b8b5);
      --transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Sidebar - Threads */
    .sidebar {
      width: 300px;
      border-right: 1px solid var(--border);
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 16px;
    }

    .brand {
      height: 56px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: var(--accent-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #131314;
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(124, 172, 248, 0.15);
    }

    .brand-title {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .threads-header {
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .threads-header span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-light);
    }

    .threads-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .thread-item {
      padding: 12px 16px;
      border-radius: 12px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .thread-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .thread-item.active {
      background: rgba(124, 172, 248, 0.08);
      border-color: rgba(124, 172, 248, 0.15);
    }

    .thread-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .thread-id {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .thread-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .btn-delete-thread {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      opacity: 0;
    }

    .thread-item:hover .btn-delete-thread {
      opacity: 1;
    }

    .btn-delete-thread:hover {
      color: #f2b8b5;
      background: rgba(242, 184, 181, 0.1);
    }

    /* Main Console - Chat Playground */
    .main-console {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg);
      border-right: 1px solid var(--border);
    }

    .console-header {
      height: 72px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: var(--transition);
    }

    .status-indicator.active {
      background: #c4eed0;
      box-shadow: 0 0 10px rgba(196, 238, 208, 0.5);
      animation: pulse 1.6s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .playground-chat {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .msg {
      max-width: 80%;
      padding: 16px 20px;
      border-radius: 20px;
      line-height: 1.6;
      font-size: 15px;
      animation: messageFadeIn 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes messageFadeIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .msg.user {
      align-self: flex-end;
      background-color: var(--surface);
      color: var(--text);
      border-bottom-right-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg.model {
      align-self: flex-start;
      background-color: transparent;
      color: var(--text-light);
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 16px;
      padding-left: 0;
    }

    .msg.model::before {
      content: 'spark';
      font-family: 'Material Symbols Outlined';
      font-size: 20px;
      color: #7cacf8;
      background: linear-gradient(135deg, #7cacf8, #c5b3e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      height: 24px;
      flex-shrink: 0;
    }

    .msg.model.error {
      color: #f2b8b5;
    }

    .msg.model.error::before {
      content: 'error';
      background: none;
      -webkit-text-fill-color: #f2b8b5;
    }

    .msg.running {
      opacity: 0.8;
    }

    /* Gemini-Style Loading Bar */
    .gemini-loader {
      display: none;
      height: 4px;
      width: 100%;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    .gemini-loader.active {
      display: block;
    }

    .gemini-loader-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #7cacf8, #c5b3e6, #f2b8b5, #7cacf8);
      background-size: 200% 100%;
      animation: loaderSlide 1.5s infinite linear;
    }

    @keyframes loaderSlide {
      0% { background-position: 0% 0%; }
      100% { background-position: -200% 0%; }
    }

    /* Chat Input area (Gemini pill styling) */
    .playground-input-area {
      padding: 24px 40px;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border-radius: 28px;
      padding: 4px 6px;
      border: 1px solid transparent;
      transition: var(--transition);
    }

    .input-wrapper:focus-within {
      border-color: var(--border-focus);
      background: #25262a;
    }

    .input-box {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 14px 20px;
      outline: none;
      font-family: var(--font-main);
      font-size: 15px;
    }

    .btn-send {
      background: transparent;
      color: var(--primary);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .btn-send:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--primary-hover);
    }

    .btn-send:disabled {
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-send span {
      font-size: 24px;
    }

    /* Inspector - Right side panel */
    .inspector {
      width: 440px;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 16px;
    }

    .inspector-card {
      flex: 1;
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .inspector-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      height: 56px;
      padding: 0 16px;
    }

    .tab-button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border-bottom: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-button:hover {
      color: var(--text-light);
    }

    .tab-button.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-button span.material-symbols-outlined {
      font-size: 20px;
    }

    .inspector-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* Material Trace Timeline */
    .trace-timeline {
      display: flex;
      flex-direction: column;
      position: relative;
      padding-left: 20px;
    }

    .trace-timeline::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: var(--border);
    }

    .trace-node {
      margin-bottom: 24px;
      position: relative;
      animation: traceSlideIn 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes traceSlideIn {
      from { transform: translateX(12px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .trace-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--surface);
      border: 3px solid var(--text-muted);
      position: absolute;
      left: -26px;
      top: 14px;
      z-index: 1;
      transition: var(--transition);
    }

    .trace-dot.running {
      border-color: #ffe294;
      animation: pulseIndicator 1.4s infinite alternate;
    }

    .trace-dot.completed {
      border-color: #c4eed0;
      background: #c4eed0;
    }

    .trace-dot.error {
      border-color: #f2b8b5;
      background: #f2b8b5;
    }

    @keyframes pulseIndicator {
      from { transform: scale(0.95); opacity: 0.6; }
      to { transform: scale(1.2); opacity: 1; }
    }

    .trace-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      transition: var(--transition);
    }

    .trace-card:hover {
      border-color: var(--border-focus);
      background: #32353a;
    }

    .trace-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .trace-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .trace-duration {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .trace-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .trace-type-badge {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.4px;
    }

    .trace-type-badge.llm { background: rgba(168, 199, 250, 0.12); color: #a8c7fa; }
    .trace-type-badge.tool { background: rgba(255, 226, 148, 0.12); color: #ffe294; }
    .trace-type-badge.prompt { background: rgba(196, 238, 208, 0.12); color: #c4eed0; }
    .trace-type-badge.response { background: rgba(197, 179, 230, 0.12); color: #c5b3e6; }

    .trace-inspect {
      display: none;
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      animation: expandPanel 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes expandPanel {
      from { height: 0; opacity: 0; }
      to { height: auto; opacity: 1; }
    }

    .trace-inspect.open {
      display: block;
    }

    .trace-inspect pre {
      font-family: var(--font-mono);
      font-size: 11.5px;
      background: var(--bg);
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow-x: auto;
      color: #c2e7ff;
      line-height: 1.6;
    }

    /* Tools panel view */
    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tool-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      transition: var(--transition);
    }

    .tool-card:hover {
      border-color: var(--border-focus);
    }

    .tool-card-name {
      font-family: var(--font-mono);
      font-size: 14px;
      color: #7cacf8;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tool-card-desc {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .tool-card-params {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      color: var(--text-light);
      max-height: 200px;
      overflow-y: auto;
    }

    /* New thread button & modal styling */
    .btn-new-thread {
      background: transparent;
      border: none;
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: var(--transition);
    }

    .btn-new-thread:hover {
      background: rgba(168, 199, 250, 0.08);
      color: var(--primary-hover);
    }
  </style>
</head>
<body>

  <!-- Sidebar: Conversational Threads -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-logo">Z</div>
      <div class="brand-title">Zenith Console</div>
    </div>
    <div class="threads-header">
      <span>Conversations</span>
      <button class="btn-new-thread" id="btn-new-thread" onclick="openNewThreadModal()" title="Start New Conversation">
        <span class="material-symbols-outlined" style="font-size: 18px;">add</span>
      </button>
    </div>
    <div class="threads-list" id="threads-list">
      <!-- Dynamically filled -->
    </div>
  </div>

  <!-- Main Section: Chat playground -->
  <div class="main-console">
    <div class="console-header">
      <div class="header-details">
        <div class="header-title" id="active-thread-title">Select or Create a Thread</div>
        <div class="header-subtitle">Chat playground utilizing the compiled agent page logic</div>
      </div>
      <div class="status-badge">
        <div class="status-indicator" id="status-indicator"></div>
        <span id="status-text">Idle</span>
      </div>
    </div>

    <!-- Gemini-Style Shimmer Loader -->
    <div class="gemini-loader" id="gemini-loader">
      <div class="gemini-loader-bar"></div>
    </div>

    <!-- Playground Chat area -->
    <div class="playground-chat" id="playground-chat">
      <div class="msg model">
        Hello! Write a message to begin executing agent loop steps and traces.
      </div>
    </div>

    <!-- Message Input box -->
    <div class="playground-input-area">
      <div class="input-wrapper">
        <input type="text" id="playground-input" class="input-box" placeholder="Ask the agent a question..." disabled>
        <button id="btn-send" class="btn-send" disabled>
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Inspector: Live metrics and tracing execution -->
  <div class="inspector">
    <div class="inspector-card">
      <div class="inspector-tabs">
        <button class="tab-button active" id="tab-btn-traces" onclick="switchTab('traces')">
          <span class="material-symbols-outlined">analytics</span>
          <span>Live Traces</span>
        </button>
        <button class="tab-button" id="tab-btn-tools" onclick="switchTab('tools')">
          <span class="material-symbols-outlined">construction</span>
          <span>Page Tools</span>
        </button>
      </div>

      <div class="inspector-content">
        <!-- Traces tab -->
        <div id="tab-traces" class="tab-panel active">
          <div class="trace-timeline" id="trace-timeline">
            <div style="font-size:13px; color:var(--text-muted); text-align:center; padding-top:40px;">
              No live execution trace active. Send a message to see steps.
            </div>
          </div>
        </div>

        <!-- Tools Tab -->
        <div id="tab-tools" class="tab-panel">
          <div class="tool-list" id="tool-list">
            <div style="font-size:13px; color:var(--text-muted); text-align:center; padding-top:40px;">
              No page tools registered.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for creating a new thread -->
  <div id="new-thread-modal" class="modal" style="display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: var(--surface); padding: 24px; border: 1px solid var(--border); border-radius: 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 16px;">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--text); margin: 0;">Start New Conversation</h3>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="new-thread-agent" style="font-size: 12px; color: var(--text-muted); font-weight: 500;">Select Agent / Page</label>
        <select id="new-thread-agent" style="background-color: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; outline: none; font-family: var(--font-main); font-size: 14px; width: 100%; cursor: pointer;">
          <!-- Filled dynamically -->
        </select>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px;">
        <button onclick="closeNewThreadModal()" style="background: transparent; border: 1px solid var(--border); color: var(--text-light); padding: 8px 16px; border-radius: 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-main); transition: var(--transition);">Cancel</button>
        <button onclick="createNewThread()" style="background: var(--primary); border: none; color: #131314; padding: 8px 16px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-main); transition: var(--transition);">Create</button>
      </div>
    </div>
  </div>

  <!-- Include Dashboard Logic -->
  <script src="/__zenith/dashboard.js"></script>
</body>
</html>
