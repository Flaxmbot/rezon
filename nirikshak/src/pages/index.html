<script type="zenith">
  agent.name = "Nirikshak";
  agent.systemPrompt = "You are Nirikshak (निरीक्षक), an elite codebase inspector, refactoring agent, and DevOps copilot. You help developers manage their local workspace. You have access to server-side tools: listProjectFiles, readProjectFile, writeProjectFile, runProjectTests, runProjectCommand.\n\nCRITICAL STATE MUTATION RULES:\n- When asked to scan/load the workspace files: Call listProjectFiles(projectPath) and assign the array of file paths to the reactive state variable 'files'. Also set 'terminalLogs' to a success message.\n- When asked to read/open a file: Call readProjectFile(projectPath, filePath), assign the file path to 'activeFile', and the read content to 'activeFileContent'. Also set 'terminalLogs' to a confirmation.\n- When asked to save a file: Call writeProjectFile(projectPath, filePath, content), and set 'terminalLogs' to a success message.\n- When asked to run tests: Call runProjectTests(projectPath) and assign the stdout/stderr to 'terminalLogs'.\n- When asked to run git status or build: Call runProjectCommand(projectPath, command) and assign the logs to 'terminalLogs'.\n\nAlways explain what tool you are calling and what changes you are making. Be precise and keep the UI state in sync!";
  agent.provider = "openrouter";
  agent.model = "qwen/qwen-2.5-coder-32b-instruct";
  agent.baseUrl = "https://openrouter.ai/api/v1";
  let connected = false;
  let provider = 'openrouter';
  let apiKey = '';
  let baseUrl = 'https://openrouter.ai/api/v1';
  let model = 'qwen/qwen-2.5-coder-32b-instruct';
  let projectPath = '';
  let activeFile = '';
  let activeFileContent = '';
  let terminalLogs = '';
  let isExecuting = false;
  let files = [];
  let messages = [];
  let prompt = '';

  // Server Tools
  server tool listProjectFiles(projectPath) {
    const fs = await import('fs');
    const path = await import('path');
    
    function walk(dir, list = []) {
      if (!fs.existsSync(dir)) return list;
      const filesList = fs.readdirSync(dir);
      for (const file of filesList) {
        if (['node_modules', '.git', '.zenith', 'dist', 'build', '.agents'].includes(file)) continue;
        const res = path.resolve(dir, file);
        const stat = fs.statSync(res);
        if (stat.isDirectory()) {
          walk(res, list);
        } else {
          if (/\.(js|jsx|ts|tsx|json|html|css|md|env|yml|yaml|txt|zenith)$/.test(file)) {
            const rel = path.relative(projectPath, res).replace(/\\/g, '/');
            list.push(rel);
          }
        }
      }
      return list;
    }
    
    try {
      const files = walk(projectPath);
      return { success: true, files };
    } catch (err) {
      return { success: false, error: err.message };
    }
  }

  server tool readProjectFile(projectPath, filePath) {
    const fs = await import('fs');
    const path = await import('path');
    const fullPath = path.resolve(projectPath, filePath);
    try {
      const content = fs.readFileSync(fullPath, 'utf-8');
      return { success: true, content };
    } catch (err) {
      return { success: false, error: err.message };
    }
  }

  server tool writeProjectFile(projectPath, filePath, content) {
    const fs = await import('fs');
    const path = await import('path');
    const fullPath = path.resolve(projectPath, filePath);
    try {
      fs.mkdirSync(path.dirname(fullPath), { recursive: true });
      fs.writeFileSync(fullPath, content, 'utf-8');
      return { success: true };
    } catch (err) {
      return { success: false, error: err.message };
    }
  }

  server tool runProjectTests(projectPath) {
    const { execSync } = await import('child_process');
    try {
      const stdout = execSync('npm test', { cwd: projectPath, encoding: 'utf-8', timeout: 15000 });
      return { success: true, log: stdout };
    } catch (err) {
      return { success: false, log: err.stdout || err.message };
    }
  }

  server tool runProjectCommand(projectPath, command) {
    const { execSync } = await import('child_process');
    try {
      const stdout = execSync(command, { cwd: projectPath, encoding: 'utf-8', timeout: 15000 });
      return { success: true, log: stdout };
    } catch (err) {
      return { success: false, log: err.stdout || err.message };
    }
  }
</script>

  <script>
    // Save LLM configuration
    window.appConnect = function() {
      const s = window.zenith.state;
      if (!s.projectPath) {
        alert("Please provide a valid workspace directory path.");
        return;
      }
      
      const config = {
        provider: s.provider,
        apiKey: s.apiKey,
        baseUrl: s.baseUrl,
        model: s.model
      };
      
      localStorage.setItem('zenith_llm_config', JSON.stringify(config));
      localStorage.setItem('nirikshak_project_path', s.projectPath);
      s.connected = true;
      
      // Auto trigger agent scan
      setTimeout(() => {
        window.appAgentScan();
      }, 500);
    };

    // Disconnect
    window.appDisconnect = function() {
      const s = window.zenith.state;
      localStorage.removeItem('zenith_llm_config');
      s.connected = false;
      s.files = [];
      s.activeFile = '';
      s.activeFileContent = '';
    };

    // Auto-fill configuration endpoints based on LLM provider choice
    window.appUpdateProvider = function(prov) {
      const s = window.zenith.state;
      s.provider = prov;
      if (prov === 'openrouter') {
        s.baseUrl = 'https://openrouter.ai/api/v1';
        s.model = 'qwen/qwen-2.5-coder-32b-instruct';
      } else if (prov === 'dashscope') {
        s.baseUrl = 'https://dashscope.aliyuncs.com/compatible-mode/v1';
        s.model = 'qwen-coder-turbo';
      } else if (prov === 'ollama') {
        s.baseUrl = 'http://localhost:11434/v1';
        s.model = 'qwen2.5-coder:7b';
      } else if (prov === 'openai') {
        s.baseUrl = 'https://api.openai.com/v1';
        s.model = 'gpt-4o';
      } else if (prov === 'gemini') {
        s.baseUrl = '';
        s.model = 'gemini-2.5-flash';
      }
    };

    // Agentic Actions - Triggered by UI elements sending instructions to the LLM agent
    window.appAgentScan = function() {
      const s = window.zenith.state;
      s.terminalLogs = `📂 Requesting Nirikshak to scan codebase path: ${s.projectPath}...`;
      window.zenith.agent.send(`Please scan the codebase directory at ${s.projectPath} and update the file list.`);
    };

    window.appAgentOpenFile = function(file) {
      const s = window.zenith.state;
      s.terminalLogs = `📄 Requesting Nirikshak to load file: ${file}...`;
      window.zenith.agent.send(`Please open the file ${file} located at ${s.projectPath} and load its contents.`);
    };

    window.appAgentSaveFile = function() {
      const s = window.zenith.state;
      if (!s.activeFile) return;
      s.terminalLogs = `💾 Requesting Nirikshak to save changes to: ${s.activeFile}...`;
      window.zenith.agent.send(`Please save the following content back to the active file ${s.activeFile} at project path ${s.projectPath}:\n\n${s.activeFileContent}`);
    };

    window.appAgentRunTests = function() {
      const s = window.zenith.state;
      s.terminalLogs = `🧪 Requesting Nirikshak to run the project tests...`;
      window.zenith.agent.send(`Please run the tests in the project at path ${s.projectPath} and report the results.`);
    };

    window.appAgentRunBuild = function() {
      const s = window.zenith.state;
      s.terminalLogs = `🏗️ Requesting Nirikshak to run build...`;
      window.zenith.agent.send(`Please execute the build command in the project at path ${s.projectPath} and report the outputs.`);
    };

    window.appAgentGitStatus = function() {
      const s = window.zenith.state;
      s.terminalLogs = `📊 Requesting Nirikshak to run git status...`;
      window.zenith.agent.send(`Please run git status on the project at path ${s.projectPath} and show me the details.`);
    };

    // Send custom message to agent
    window.appSendAgentMessage = function() {
      const s = window.zenith.state;
      if (!s.prompt || s.prompt.trim() === '') return;
      const text = s.prompt;
      s.prompt = '';
      window.zenith.agent.send(text);
    };

    // Load configs from localstorage on start
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const s = window.zenith.state;
        const savedConfig = localStorage.getItem('zenith_llm_config');
        const savedPath = localStorage.getItem('nirikshak_project_path');
        
        if (savedConfig) {
          try {
            const parsed = JSON.parse(savedConfig);
            s.provider = parsed.provider || 'openrouter';
            s.apiKey = parsed.apiKey || '';
            s.baseUrl = parsed.baseUrl || 'https://openrouter.ai/api/v1';
            s.model = parsed.model || 'qwen/qwen-2.5-coder-32b-instruct';
            s.connected = true;
          } catch (e) {}
        }
        
        if (savedPath) {
          s.projectPath = savedPath;
        } else {
          s.projectPath = '';
        }
        
        if (s.connected && s.projectPath) {
          window.appAgentScan();
        }
      }, 200);
    });
  </script>
