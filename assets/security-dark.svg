<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Canvas Background -->
  <rect width="800" height="420" rx="16" fill="#131314" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

  <!-- Title / Header -->
  <g transform="translate(40, 45)">
    <text x="0" y="0" fill="#e3e3e3" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="-0.3px">Security Architecture</text>
    <text x="0" y="22" fill="#8e918f" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Zero-trust boundary separating public client assets from secure server resources</text>
  </g>

  <!-- Left: Client Card (Browser) -->
  <g transform="translate(40, 100)">
    <!-- Main Card Body -->
    <rect width="320" height="280" rx="16" fill="#1e1f20" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    
    <!-- Title Area -->
    <g transform="translate(24, 32)">
      <!-- Browser Icon -->
      <circle cx="16" cy="16" r="14" fill="rgba(255, 255, 255, 0.03)"/>
      <path d="M16 8a8 8 0 100 16 8 8 0 000-16zm0 2a6 6 0 011.5 4h-3a6 6 0 011.5-4zm-4.5 4h9c0 .7.1 1.3.1 2h-9.2c0-.7.1-1.3.1-2zm.3 4h8.6a6 6 0 01-1.3 2h-6a6 6 0 01-1.3-2z" fill="#a8c7fa"/>
      <text x="44" y="21" fill="#e3e3e3" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Browser (Client-Side)</text>
    </g>

    <!-- Content Items -->
    <g transform="translate(24, 76)">
      <!-- Item 1 (Allowed) -->
      <g transform="translate(0, 0)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Reactive state (let/var)</text>
      </g>
      <!-- Item 2 (Allowed) -->
      <g transform="translate(0, 32)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Template HTML structure</text>
      </g>
      <!-- Item 3 (Allowed) -->
      <g transform="translate(0, 64)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Scoped CSS styles</text>
      </g>
      <!-- Divider -->
      <line x1="0" y1="92" x2="272" y2="92" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
      <!-- Item 4 (Blocked) -->
      <g transform="translate(0, 108)">
        <circle cx="10" cy="10" r="8" fill="rgba(242, 184, 181, 0.15)"/>
        <path d="M7 7l6 6m0-6l-6 6" stroke="#f2b8b5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="26" y="14" fill="#8e918f" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Server secrets (const)</text>
      </g>
      <!-- Item 5 (Blocked) -->
      <g transform="translate(0, 140)">
        <circle cx="10" cy="10" r="8" fill="rgba(242, 184, 181, 0.15)"/>
        <path d="M7 7l6 6m0-6l-6 6" stroke="#f2b8b5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="26" y="14" fill="#8e918f" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Tool execution source code</text>
      </g>
      <!-- Item 6 (Blocked) -->
      <g transform="translate(0, 172)">
        <circle cx="10" cy="10" r="8" fill="rgba(242, 184, 181, 0.15)"/>
        <path d="M7 7l6 6m0-6l-6 6" stroke="#f2b8b5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="26" y="14" fill="#8e918f" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Google Gemini API Keys</text>
      </g>
    </g>
  </g>

  <!-- Right: Server Card (Node.js) -->
  <g transform="translate(440, 100)">
    <!-- Main Card Body -->
    <rect width="320" height="280" rx="16" fill="#1e1f20" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    
    <!-- Title Area -->
    <g transform="translate(24, 32)">
      <!-- Server Icon -->
      <circle cx="16" cy="16" r="14" fill="rgba(255, 255, 255, 0.03)"/>
      <path d="M8 9h16v3H8V9zm0 6h16v3H8v-3zm0 6h16v3H8v-3z" stroke="#a8c7fa" stroke-width="1.5" fill="none"/>
      <text x="44" y="21" fill="#e3e3e3" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Server (Node.js Environment)</text>
    </g>

    <!-- Content Items -->
    <g transform="translate(24, 76)">
      <!-- Item 1 -->
      <g transform="translate(0, 0)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Secure API Keys &amp; const secrets</text>
      </g>
      <!-- Item 2 -->
      <g transform="translate(0, 32)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Database queries &amp; storage</text>
      </g>
      <!-- Item 3 -->
      <g transform="translate(0, 64)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Tool execution runtime</text>
      </g>
      <!-- Item 4 -->
      <g transform="translate(0, 96)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">API Rate Limiting protection</text>
      </g>
      <!-- Item 5 -->
      <g transform="translate(0, 128)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">HMAC session token validation</text>
      </g>
      <!-- Item 6 -->
      <g transform="translate(0, 160)">
        <circle cx="10" cy="10" r="8" fill="rgba(196, 238, 208, 0.15)"/>
        <path d="M7 10l2 2 4-4" stroke="#c4eed0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" fill="#c4c7c5" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="13">Direct Gemini API tool invocation</text>
      </g>
    </g>
  </g>

  <!-- Center: HMAC Communication Bridge -->
  <g transform="translate(360, 210)">
    <!-- Connection line -->
    <path d="M 0,20 L 80,20" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4,4"/>
    
    <!-- Arrows -->
    <path d="M 5,16 L 0,20 L 5,24" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 75,16 L 80,20 L 75,24" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Bridge Badge (HMAC) -->
    <g transform="translate(15, -4)">
      <rect width="50" height="22" rx="6" fill="#1e1f20" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
      <text x="25" y="14" fill="#8e918f" font-family="'Outfit', system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.05em">HMAC</text>
    </g>
    
    <!-- Shield / Lock Icon -->
    <g transform="translate(28, 28)">
      <circle cx="12" cy="12" r="10" fill="#1e1f20" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
      <path d="M12 7a3 3 0 00-3 3v2H8v5h8v-5h-1v-2a3 3 0 00-3-3zm-1.5 3a1.5 1.5 0 113 0v2h-3v-2z" fill="#8e918f"/>
    </g>
  </g>
</svg>
